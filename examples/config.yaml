# PolyRobin sample configuration
# Copy to ~/.polyrobin/config.yaml and adjust. NEVER put private keys here —
# PolyRobin signs through a user-controlled signer only.

# --- Bankroll & signing -----------------------------------------------------
bankroll_source: robinhood-chain   # home chain (native, first-class venue)
signer: ledger                     # ledger | walletconnect | keystore

# --- Risk: the 7 hard gates -------------------------------------------------
# Fractions of bankroll unless suffixed _usd.
risk:
  daily_loss_limit: 0.05           # gate 1 — HALT if daily drawdown reaches this
  max_per_market: 0.10             # gate 2 — cap on any single market
  max_per_category: 0.25           # gate 3 — cap per category (crypto/politics/…)
  conviction_threshold: 65         # gate 4a — min conviction score (0–100)
  min_edge: 0.04                   # gate 4b — min net EV to open a position
  confirm_all_material_actions: true  # gate 5 — ALWAYS ON, cannot be disabled
  total_deployed_cap: 0.60         # gate 6 — keep dry powder + hedge buffer
  min_liquidity_usd: 50000         # gate 7 — order-book depth floor
  min_volume_usd: 250000           # gate 7 — market volume floor
  kelly_fraction: 0.25             # fractional Kelly (¼-Kelly default)

# --- HALT / kill-switch tuning ----------------------------------------------
halt:
  volatility_band: 0.15            # HALT if price/underlying moves beyond this fast
  feed_staleness_seconds: 90       # HALT on oracle data older than this
  max_consecutive_losses: 3        # rolling-24h streak that trips the kill-switch

# --- Bridging (always route INTO Robinhood Chain) ---------------------------
bridge:
  destination: robinhood-chain     # funds are bridged into RH Chain
  routing: optimal                 # auto-pick cheapest/fastest source
  max_wait_seconds: 600            # treat funds as unavailable beyond this

# --- Integrations -----------------------------------------------------------
integrations:
  polymarket:
    enabled: true                  # Polygon venue
  robinhood_chain:
    enabled: true                  # first-class home venue
  meridian_predict:
    enabled: true                  # tokenized event / stock-event markets
  chainlink:
    enabled: true                  # price + resolution feeds, staleness checks
  hyperliquid:
    enabled: false                 # enable for perp hedging / arb
  morpho:
    enabled: false                 # enable for borrow/lend hedging
    health_factor_buffer: 0.15     # alert/de-risk before liquidation
  notifier:
    enabled: true
    channel: cli                   # cli | webhook | push
    # webhook_url: https://example.com/hook

# --- Audit ------------------------------------------------------------------
audit:
  dir: ~/.polyrobin/audit
  format: both                     # json | human | both
  retain_days: 365
