<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="PolyRobin logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6C5CE7"/>
      <stop offset="1" stop-color="#00B894"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- bow -->
  <path d="M40 24 A56 56 0 0 1 40 104" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
  <!-- bowstring -->
  <path d="M40 24 L40 104" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
  <!-- arrow shaft -->
  <line x1="34" y1="64" x2="104" y2="64" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round"/>
  <!-- arrow head -->
  <path d="M104 64 L88 54 L92 64 L88 74 Z" fill="#FFFFFF"/>
  <!-- fletching -->
  <path d="M34 64 L24 56 M34 64 L24 72" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
  <!-- target dot -->
  <circle cx="64" cy="64" r="6.5" fill="#FFEAA7" stroke="#2D3436" stroke-width="2"/>
</svg>
